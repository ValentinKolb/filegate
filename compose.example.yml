services:
  filegate:
    build: .
    ports:
      - "8080:8080"
    environment:
      FILEGATE_AUTH_BEARER_TOKEN: "your-secret-token-here"
      FILEGATE_STORAGE_BASE_PATHS: "/data/homes,/data/groups"
      FILEGATE_STORAGE_INDEX_PATH: "/var/lib/filegate/index"
      FILEGATE_SERVER_LISTEN: ":8080"
      FILEGATE_SERVER_WRITE_TIMEOUT: "5m"
      FILEGATE_DETECTION_POLL_INTERVAL: "3s"
      FILEGATE_UPLOAD_EXPIRY: "24h"
      FILEGATE_UPLOAD_CLEANUP_INTERVAL: "6h"
      FILEGATE_UPLOAD_MAX_CHUNK_BYTES: "52428800"     # 50 MiB
      FILEGATE_UPLOAD_MAX_UPLOAD_BYTES: "524288000"   # 500 MiB
    volumes:
      - /export/homes:/data/homes
      - /export/groups:/data/groups
      - filegate-index:/var/lib/filegate/index
    restart: unless-stopped

volumes:
  filegate-index:
