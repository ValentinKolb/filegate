# Filegate S3-compatible deployment, ready for rclone / restic /
# Cyberduck / awscli to connect via path-style addressing.
#
# Two services:
#   - filegate: the daemon. REST on :8080 (bearer-token auth) and
#               S3 on :9100 (SigV4 auth). Both bind to the
#               container's interfaces; Caddy is the only thing
#               that should expose them outside the compose network.
#   - caddy:    automatic-HTTPS reverse proxy. Hands HTTPS down to
#               filegate as plain HTTP. Caddy gets a Let's Encrypt
#               cert for the configured hostname.
#
# Quick start:
#   1. Copy this file to compose.yml in your deployment directory.
#   2. Copy filegate.s3.example.yaml to filegate.yaml (next to
#      this compose file) and edit AT LEAST the access_key /
#      secret_key under s3.keys[].
#   3. Set FILEGATE_S3_HOST below (e.g. s3.example.com).
#   4. Replace the bind-mount paths under volumes: with your real
#      data directories.
#   5. docker compose up -d
#   6. Connect Cyberduck / rclone / awscli per docs/s3-clients.md
#      using the access_key / secret_key from your filegate.yaml.

services:
  filegate:
    build: .
    # No host-port publish — Caddy is the only thing that talks
    # to filegate. If you want REST exposed without the proxy too,
    # add `- "8080:8080"` here.
    environment:
      # Path-based config — viper reads this on startup.
      FILEGATE_CONFIG: "/etc/filegate/filegate.yaml"
    volumes:
      # Multi-tenant key store + S3 listener config.
      - ./filegate.yaml:/etc/filegate/filegate.yaml:ro
      # Data buckets. Each base_paths entry becomes one S3 bucket.
      # The directory leaf is the bucket name (3-63 chars,
      # lowercase, alphanumeric + hyphens).
      - /export/photos:/data/photos
      - /export/backups:/data/backups
      - /export/archive:/data/archive
      # Persistent index; small, but its loss triggers a rebuild
      # walk so volumes are preferable to anonymous mounts.
      - filegate-index:/var/lib/filegate/index
    restart: unless-stopped

  caddy:
    image: caddy:2
    ports:
      - "80:80"
      - "443:443"
    environment:
      # The public hostname clients (Cyberduck, rclone, etc.)
      # connect to. Caddy gets a real cert for this name and
      # path-style addressing routes /<bucket>/<key> through it
      # without per-bucket DNS.
      FILEGATE_S3_HOST: "s3.example.com"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - filegate
    restart: unless-stopped

volumes:
  filegate-index:
  caddy-data:
  caddy-config:
