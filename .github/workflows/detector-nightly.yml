name: Detector Nightly

on:
  schedule:
    - cron: "17 2 * * *"
  workflow_dispatch:

jobs:
  soak-chaos:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Detector sync regression tests
        run: make test-detector-linux
      - name: Detector soak test
        env:
          FILEGATE_SOAK_DURATION: 45s
        run: make test-detector-soak
      - name: Detector chaos test
        env:
          FILEGATE_CHAOS_DURATION: 60s
        run: make test-detector-chaos

  btrfs-real:
    runs-on: [self-hosted, linux, btrfs]
    steps:
      - uses: actions/checkout@v4
      - name: Real btrfs detector/index sync
        env:
          FILEGATE_BTRFS_REAL_ROOT: /var/tmp/filegate-btrfs
        run: make test-detector-btrfs-real
