name: Detector Soak

# Long-running soak/chaos coverage for the detector. Runs weekly because
# minute-scale soak windows are wasted budget if executed nightly. The
# fast detector regression suite runs on every push via ci.yml.

on:
  schedule:
    # Sundays at 02:17 UTC.
    - cron: "17 2 * * 0"
  workflow_dispatch:
    inputs:
      soak_duration:
        description: "Soak duration (e.g. 5m, 10m)"
        required: false
        default: "5m"
      chaos_duration:
        description: "Chaos duration (e.g. 5m, 10m)"
        required: false
        default: "5m"
      run_btrfs_real:
        description: "Also run real-btrfs job (requires self-hosted runner)"
        required: false
        default: "false"

jobs:
  soak-chaos:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Detector soak test
        env:
          FILEGATE_SOAK_DURATION: ${{ inputs.soak_duration || '5m' }}
        run: make test-detector-soak
      - name: Detector chaos test
        env:
          FILEGATE_CHAOS_DURATION: ${{ inputs.chaos_duration || '5m' }}
        run: make test-detector-chaos

  btrfs-real:
    # Self-hosted runner with a real btrfs subvolume. Only triggered manually
    # via workflow_dispatch when run_btrfs_real=true — avoids permanently
    # queued jobs if the runner is offline.
    if: github.event_name == 'workflow_dispatch' && inputs.run_btrfs_real == 'true'
    runs-on: [self-hosted, linux, btrfs]
    steps:
      - uses: actions/checkout@v4
      - name: Real btrfs detector/index sync
        env:
          FILEGATE_BTRFS_REAL_ROOT: /var/tmp/filegate-btrfs
        run: make test-detector-btrfs-real
