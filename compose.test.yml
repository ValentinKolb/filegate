services:
  filegate:
    build: .
    user: "0:0"
    ports:
      - "4111:8080"
    environment:
      FILEGATE_AUTH_BEARER_TOKEN: "test-integration-token"
      FILEGATE_SERVER_LISTEN: ":8080"
      FILEGATE_STORAGE_BASE_PATHS: "/data"
      FILEGATE_STORAGE_INDEX_PATH: "/var/lib/filegate/index"
      FILEGATE_UPLOAD_EXPIRY: "1h"
      FILEGATE_UPLOAD_CLEANUP_INTERVAL: "10m"
      FILEGATE_UPLOAD_MAX_CHUNK_BYTES: "10485760"   # 10 MiB
      FILEGATE_UPLOAD_MAX_UPLOAD_BYTES: "104857600" # 100 MiB
    volumes:
      - filegate-test-data:/data
      - filegate-test-index:/var/lib/filegate/index
    healthcheck:
      test:
        [
          "CMD",
          "/app/filegate",
          "index",
          "stats",
        ]
      interval: 2s
      timeout: 5s
      retries: 10
      start_period: 3s

volumes:
  filegate-test-data:
  filegate-test-index:
